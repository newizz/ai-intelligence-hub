  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #f0883e;
    --purple: #bc8cff;
    --red: #f85149;
    --tag-bg: #1f2d40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

  /* ── TOPBAR ─────────────────────────────────── */
  .topbar {
    background: #0d1f35;
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-badge {
    background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3);
    color: var(--blue); font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-label { font-size: 12px; color: var(--muted); }
  .week-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-size: 13px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
    min-width: 200px; outline: none;
  }
  .week-select:focus { border-color: var(--blue); }
  .nav-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--blue); color: var(--blue); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── HEADER ─────────────────────────────────── */
  .report-header {
    background: linear-gradient(135deg, #0d1f35 0%, #1a0d35 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border); padding: 40px 40px 28px;
    position: relative; overflow: hidden;
  }
  .report-header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 25% 60%, rgba(88,166,255,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 40%, rgba(188,140,255,0.06) 0%, transparent 55%);
    pointer-events: none;
  }
  .report-header-inner { max-width: 1060px; margin: 0 auto; position: relative; }
  .week-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.25);
    color: var(--green); font-size: 11px; font-weight: 700; padding: 3px 12px;
    border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px;
  }
  .report-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.4px;
    background: linear-gradient(90deg,#e6edf3 0%,#58a6ff 50%,#bc8cff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .report-sub { font-size: 14px; color: var(--muted); }
  .report-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 14px; }
  .meta-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── STATS ──────────────────────────────────── */
  .statsbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 40px; }
  .stats-grid { max-width: 1060px; margin: 0 auto; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .stat-num { font-size: 22px; font-weight: 800; color: var(--blue); }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }

  /* ── MAIN ───────────────────────────────────── */
  .main { max-width: 1060px; margin: 0 auto; padding: 36px 40px; }

  /* ── SECTION ────────────────────────────────── */
  .section { margin-bottom: 44px; }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .sec-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .sec-icon.b { background: rgba(88,166,255,0.15); }
  .sec-icon.g { background: rgba(63,185,80,0.15); }
  .sec-icon.p { background: rgba(188,140,255,0.15); }
  .sec-title { font-size: 1.15rem; font-weight: 700; }
  .sec-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  hr.div { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  /* ── NEWS CARDS ─────────────────────────────── */

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
  .card:hover { border-color: rgba(88,166,255,0.35); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 700; }
  .src { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px 9px; font-size: 11px; color: var(--blue); white-space: nowrap; font-weight: 600; }
  .body-txt { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .ctx { background: rgba(88,166,255,0.06); border-left: 3px solid var(--blue); padding: 8px 12px; font-size: 12px; color: var(--muted); margin-top: 8px; border-radius: 0 5px 5px 0; }
  .ctx strong { color: var(--blue); }
  .imp { background: rgba(63,185,80,0.06); border-left: 3px solid var(--green); padding: 8px 12px; font-size: 12px; color: var(--muted); margin-top: 6px; border-radius: 0 5px 5px 0; }
  .imp strong { color: var(--green); }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .tag { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--muted); }

  .tools-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .tool-card:hover { border-color: rgba(63,185,80,0.35); }
  .th { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .tn { font-size: 14px; font-weight: 700; }
  .tbadge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
  .tm { background: rgba(88,166,255,0.15); color: var(--blue); }
  .tr { background: rgba(63,185,80,0.15); color: var(--green); }
  .tp { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tt { background: rgba(240,136,62,0.15); color: var(--orange); }
  .cap { list-style: none; }
  .cap li { font-size: 12px; color: var(--muted); padding: 3px 0 3px 14px; position: relative; }
  .cap li::before { content: '▸'; position: absolute; left: 0; color: var(--green); font-size: 9px; top: 5px; }
  .brow { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .blbl { font-size: 11px; color: var(--muted); width: 130px; flex-shrink: 0; }
  .btrack { flex: 1; background: var(--surface2); border-radius: 3px; height: 7px; overflow: hidden; }
  .bfill { height: 100%; border-radius: 3px; }
  .bval { font-size: 11px; font-weight: 700; width: 40px; text-align: right; }

  .tlink:hover { background: rgba(63,185,80,0.16); border-color: rgba(63,185,80,0.4); }
  .com-ref { display: inline-flex; align-items: center; gap: 5px; color: var(--purple); font-size: 12px; font-weight: 600; text-decoration: none; background: rgba(188,140,255,0.08); border: 1px solid rgba(188,140,255,0.2); border-radius: 5px; padding: 4px 10px; margin-top: 6px; transition: background 0.15s, border-color 0.15s; }

  .news-ref {

    border-radius: 5px; padding: 4px 10px; margin-top: 10px;
    transition: background 0.15s, border-color 0.15s;

  .com-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
  .pulse { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .pi { font-size: 18px; width: 28px; flex-shrink: 0; }
  .pt { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .pd { font-size: 12px; color: var(--muted); }
  .ipad-box {
    background: linear-gradient(135deg,rgba(240,136,62,0.08) 0%,rgba(188,140,255,0.06) 100%);
    border: 1px solid rgba(240,136,62,0.2); border-radius: 10px; padding: 14px 18px; margin-top: 14px;

  .ipad-txt { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .empty { text-align: center; padding: 80px 40px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

  .footer { background: var(--surface); border-top: 1px solid var(--border); padding: 20px 40px; text-align: center; }
  .footer-txt { font-size: 11px; color: var(--muted); }

  @media (max-width: 680px) {
    .topbar { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; padding-top: 8px; padding-bottom: 8px; }
    .main { padding: 24px 16px; }
    .tools-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>

/* ════════════════════════════════════════════════
   RENDERER
   ════════════════════════════════════════════════ */
const sortedKeys = Object.keys(REPORTS).sort((a,b) => b.localeCompare(a));
let currentIdx = 0;

function buildSelect() {
  const sel = document.getElementById('weekSelect');
  sortedKeys.forEach((k,i) => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = '📅 ' + REPORTS[k].weekLabel;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  });
}

function navigate(dir) {
  currentIdx = Math.max(0, Math.min(sortedKeys.length - 1, currentIdx + dir));
  const key = sortedKeys[currentIdx];
  document.getElementById('weekSelect').value = key;
  showReport(key);
  updateNavBtns();
}

function updateNavBtns() {
  document.getElementById('prevBtn').disabled = currentIdx >= sortedKeys.length - 1;
  document.getElementById('nextBtn').disabled = currentIdx <= 0;
}

function badge(type) {
  const map = { model:'<span class="tbadge tm">MODEL</span>', repo:'<span class="tbadge tr">REPO</span>', paper:'<span class="tbadge tp">PAPER</span>', tool:'<span class="tbadge tt">TOOL</span>' };
  return map[type] || '';
}

function showReport(key) {
  currentIdx = sortedKeys.indexOf(key);
  updateNavBtns();
  const r = REPORTS[key];
  if (!r) { document.getElementById('reportContainer').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><h3>ไม่พบรายงานสำหรับสัปดาห์นี้</h3></div>'; return; }

  const newsHTML = r.bigMoves.map(n => `
    <div class="card">
      <div class="card-top"><div class="card-title">${n.title}</div><span class="src">⚡ ${n.source}</span></div>
      <p class="body-txt">${n.summary}</p>
      ${n.context ? `<div class="ctx"><strong>🔍 Context:</strong> ${n.context}</div>` : ''}
      ${n.impact ? `<div class="imp"><strong>🏭 iPAD Impact:</strong> ${n.impact}</div>` : ''}
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:10px;">
        <div class="tags" style="margin-top:0">${(n.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${n.link ? `<a href="${n.link}" class="news-ref" target="_blank">🔗 อ่านต้นทาง</a>` : ''}
      </div>
    </div>`).join('');

  const toolHTML = r.tooling.map(t => `
    <div class="tool-card">
      <div class="th"><span class="tn">${t.name}</span>${badge(t.type)}</div>
      <ul class="cap">${(t.caps||[]).map(c=>`<li>${c}</li>`).join('')}</ul>
      ${(t.benchmarks||[]).map(b=>`
        <div class="brow">
          <span class="blbl">${b.label}</span>
          <div class="btrack"><div class="bfill" style="width:${b.pct}%;background:${b.color}"></div></div>
          <span class="bval">${b.val}</span>
        </div>`).join('')}
      ${t.limit ? `<div class="lim">⚠️ Limitation: ${t.limit}</div>` : ''}
      ${t.impact ? `<div class="imp" style="margin-top:8px"><strong>🏭 iPAD:</strong> ${t.impact}</div>` : ''}
      ${t.link ? `<a href="${t.link}" class="tlink" target="_blank">🔗 ดูแหล่งข้อมูล</a>` : ''}
    </div>`).join('');

  const comHTML = r.community.map(c=>`
    <div class="pulse">
      <div class="pi">${c.icon}</div>
      <div><div class="pt">${c.title}</div><div class="pd">${c.desc}</div>
      ${c.link ? `<a href="${c.link}" class="com-ref" target="_blank">🔗 ดูแหล่งข้อมูล</a>` : ''}</div>
    </div>`).join('');

  document.getElementById('reportContainer').innerHTML = `
    <div class="report-header">
      <div class="report-header-inner">
        <div class="week-pill">📅 ${r.weekLabel}</div>
        <div class="report-title">🚀 Weekly AI Intelligence Report</div>
        <div class="report-sub">รายงานแนวโน้ม AI ประจำสัปดาห์ · Industrial AI Product Development</div>
        <div class="report-meta">
          <div class="meta-chip"><div class="dot" style="background:#3fb950"></div><span>${r.weekLabel}</span></div>
          <div class="meta-chip"><div class="dot" style="background:#58a6ff"></div><span>Published: ${r.publishDate}</span></div>
        </div>
      </div>
    </div>

    <div class="statsbar">
      <div class="stats-grid">
        <div class="stat"><span style="font-size:22px">📰</span><div><div class="stat-num">${r.stats.news}</div><div class="stat-lbl">Big News Items</div></div></div>
        <div class="stat"><span style="font-size:22px">🔧</span><div><div class="stat-num">${r.stats.tools}</div><div class="stat-lbl">Models & Repos</div></div></div>
        <div class="stat"><span style="font-size:22px">💬</span><div><div class="stat-num">${r.stats.community}</div><div class="stat-lbl">Community Pulses</div></div></div>
        <div class="stat"><span style="font-size:22px">🏭</span><div><div class="stat-num">${r.stats.industrial}</div><div class="stat-lbl">Industrial Insights</div></div></div>
      </div>
    </div>

    <div class="main">
      <div class="section">
        <div class="sec-head"><div class="sec-icon b">🏢</div><div><div class="sec-title">1. News & Corporate Updates — [Big Moves]</div><div class="sec-sub">ข่าวใหญ่จาก AI Labs และ Tech Media ในช่วง 7 วันที่ผ่านมา</div></div></div>
        <div class="news-grid">${newsHTML}</div>
      </div>
      <hr class="div">
      <div class="section">
        <div class="sec-head"><div class="sec-icon g">🔬</div><div><div class="sec-title">2. Research, Repos & Tools — [Tooling & SOTA]</div><div class="sec-sub">โมเดล, GitHub Repos, และงานวิจัยที่น่าติดตามในสัปดาห์นี้</div></div></div>
        <div class="tools-grid">${toolHTML}</div>
      </div>
      <hr class="div">
      <div class="section">
        <div class="sec-head"><div class="sec-icon p">💬</div><div><div class="sec-title">3. Community Highlights & Industrial View — [Community Pulse]</div><div class="sec-sub">สิ่งที่ AI Community กำลังตื่นเต้น และมุมมอง iPAD</div></div></div>
        <div class="com-card">
          ${comHTML}
          <div class="ipad-box">
            <div class="ipad-title">🏭 iPAD Application — Industrial AI Outlook</div>
            <div class="ipad-txt">${r.ipadSummary}</div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('footerSources').textContent =
    '🚀 Weekly AI Intelligence Report · iPAD — Industrial AI Product Development | Sources: ' + r.sources;
}

buildSelect();
showReport(sortedKeys[0]);
updateNavBtns();
